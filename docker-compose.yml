services:
  postgres:
    image: postgres:16-alpine
    container_name: yoborracho-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: yoborracho
      POSTGRES_PASSWORD: yoborracho
      POSTGRES_DB: yoborracho
    ports:
      - "5432:5432"
    volumes:
      - yoborracho_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yoborracho -d yoborracho"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: yoborracho-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://yoborracho:yoborracho@postgres:5432/yoborracho
      # Se toma del .env en la raíz (docker compose lo lee solo, no hace falta --env-file).
      # Antes este valor estaba escrito directo acá — lo saqué porque este archivo se
      # sube al repo público y ese secreto hubiera quedado expuesto.
      JWT_SECRET: ${JWT_SECRET:?Falta JWT_SECRET. Copiá .env.example a .env en la raíz del proyecto.}
      JWT_EXPIRES_IN: 7d
      PORT: 3001
      CORS_ORIGIN: http://localhost:5173
      NODE_ENV: development
      REGRESO_RECORDATORIO_MS: 180000
    ports:
      - "3001:3001"
    # Corre las migraciones automáticamente en cada arranque (son idempotentes,
    # se registran en la tabla schema_migrations) y después levanta el servidor.
    # El seed NO se corre automáticamente: se ejecuta una sola vez a mano con
    #   docker compose run --rm backend npm run seed
    command: sh -c "npm run migrate && npm start"

  frontend:
    build:
      context: ./yoborracho
      dockerfile_inline: |
        FROM node:20-alpine
        WORKDIR /app
        EXPOSE 5173
        CMD ["sh", "-c", "npm install && npm run dev -- --host"]
    container_name: yoborracho-frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./yoborracho:/app
      - yoborracho_frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE_URL: http://localhost:3001
      VITE_WS_URL: http://localhost:3001
      # VITE_GOOGLE_MAPS_API_KEY se toma del archivo yoborracho/.env montado como volumen
    depends_on:
      - backend

volumes:
  yoborracho_pgdata:
  yoborracho_frontend_node_modules:
